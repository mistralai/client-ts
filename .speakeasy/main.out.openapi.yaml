            - type: "null"
        _meta:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
          title: Meta
        type:
          type: string
          title: Type
          const: resource_link
      title: ResourceLink
      required:
        - name
        - uri
        - type
      additionalProperties: true
      description: |-
        A resource that the server is capable of reading, included in a prompt or tool call result.

        Note: resource links returned by tools are not guaranteed to appear in the results of `resources/list` requests.
    ResourceVisibility:
      type: string
      title: ResourceVisibility
      enum:
        - shared_global
        - shared_org
        - shared_workspace
        - private
    TextContent:
      type: object
      properties:
        type:
          type: string
          title: Type
          const: text
        text:
          type: string
          title: Text
        annotations:
          anyOf:
            - $ref: '#/components/schemas/Annotations'
            - type: "null"
        _meta:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
          title: Meta
      title: TextContent
      required:
        - type
        - text
      additionalProperties: true
      description: Text content for a message.
    TextResourceContents:
      type: object
      properties:
        uri:
          type: string
          title: Uri
          minLength: 1
          format: uri
        mimeType:
          anyOf:
            - type: string
            - type: "null"
          title: Mimetype
        _meta:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
          title: Meta
        text:
          type: string
          title: Text
      title: TextResourceContents
      required:
        - uri
        - text
      additionalProperties: true
      description: Text contents of a resource.
    integrations__schemas__api__tool__Tool:
      type: object
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
        system_prompt:
          anyOf:
            - type: string
            - type: "null"
          title: System Prompt
        locale:
          anyOf:
            - $ref: '#/components/schemas/integrations__schemas__turbine__ToolLocale'
            - type: "null"
        jsonschema:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
          title: Jsonschema
        execution_config:
          anyOf:
            - $ref: '#/components/schemas/ExecutionConfig'
            - type: "null"
        visibility:
          $ref: '#/components/schemas/ResourceVisibility'
        created_at:
          type: string
          title: Created At
          format: date-time
        modified_at:
          type: string
          title: Modified At
          format: date-time
        active:
          anyOf:
            - type: boolean
            - type: "null"
          title: Active
      title: Tool
      required:
        - id
        - name
        - description
        - execution_config
        - visibility
        - created_at
        - modified_at
    integrations__schemas__turbine__ToolLocale:
      type: object
      properties:
        name:
          type: object
          propertyNames:
            $ref: '#/components/schemas/ConnectorSupportedLanguage'
          title: Name
          additionalProperties:
            type: string
        description:
          type: object
          propertyNames:
            $ref: '#/components/schemas/ConnectorSupportedLanguage'
          title: Description
          additionalProperties:
            type: string
        usage_sentence:
          type: object
          propertyNames:
            $ref: '#/components/schemas/ConnectorSupportedLanguage'
          title: Usage Sentence
          additionalProperties:
            type: string
      title: ToolLocale
      required:
        - name
        - description
        - usage_sentence
