name: Publish MISTRALAI-SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
"on":
  push:
    branches:
      - main
    paths:
      - RELEASES.md
      - '*/RELEASES.md'
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type 'publish' to confirm v2 release"
        required: true
jobs:
  publish:
    if: github.event_name == 'push' || github.event.inputs.confirm_publish == 'publish'
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@a658ca0a4a9b11bbcd7d3fb4e3063fa843afabff # v15
    secrets:
      github_access_token: ${{ secrets.CLIENT_PIPELINE }}
      npm_token: ${{ secrets.NPM_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
