workflowVersion: 1.0.0
speakeasyVersion: v1.761.0
sources:
    mistral-azure-source:
        inputs:
            - location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-azure:v2
        output: ./packages/mistralai-azure/.speakeasy/azure.out.openapi.yaml
    mistral-google-cloud-source:
        inputs:
            - location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-google-cloud:v2
        output: ./packages/mistralai-gcp/.speakeasy/gcp.out.openapi.yaml
    mistral-openapi:
        inputs:
            - location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi:v2
        output: .speakeasy/main.out.openapi.yaml
targets:
    mistralai-azure-sdk:
        target: typescript
        source: mistral-azure-source
        output: ./packages/mistralai-azure
        publish:
            npm:
                token: $npm_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-azure-code-samples
            blocking: false
    mistralai-gcp-sdk:
        target: typescript
        source: mistral-google-cloud-source
        output: ./packages/mistralai-gcp
        publish:
            npm:
                token: $npm_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-google-cloud-code-samples
            blocking: false
    mistralai-sdk:
        target: typescript
        source: mistral-openapi
        publish:
            npm:
                token: $npm_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-code-samples
            blocking: false
