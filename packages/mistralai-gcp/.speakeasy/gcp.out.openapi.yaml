openapi: 3.1.0
info:
  title: Mistral AI API
  description: Our Chat Completion and Embeddings APIs specification. Create your account on [La Plateforme](https://console.mistral.ai) to get access and read the [docs](https://docs.mistral.ai) to learn how to use it.
  version: 1.0.0
paths:
  /streamRawPredict:
    post:
      tags:
        - chat
      operationId: stream_chat
      x-speakeasy-name-override: stream
      summary: Stream chat completion
      description: 'Mistral AI provides the ability to stream responses back to a client in order to allow partial results for certain requests. Tokens will be sent as data-only server-sent events as they become available, with the stream terminated by a data: [DONE] message. Otherwise, the server will hold the request open until the timeout or until completion, with the response containing the full result as JSON.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionStreamRequest'
      responses:
        '200':
          description: A stream of chat completion events
          content:
            text/event-stream:
              x-speakeasy-sse-sentinel: '[DONE]'
              schema:
                $ref: '#/components/schemas/CompletionEvent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /streamRawPredict#fim:
    post:
      tags:
        - fim
      operationId: stream_fim
      x-speakeasy-name-override: stream
      summary: Stream fim completion
      description: 'Mistral AI provides the ability to stream responses back to a client in order to allow partial results for certain requests. Tokens will be sent as data-only server-sent events as they become available, with the stream terminated by a data: [DONE] message. Otherwise, the server will hold the request open until the timeout or until completion, with the response containing the full result as JSON.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FIMCompletionStreamRequest'
      responses:
        '200':
          description: A stream of FIM completion events
          content:
            text/event-stream:
              x-speakeasy-sse-sentinel: '[DONE]'
              schema:
                $ref: '#/components/schemas/CompletionEvent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rawPredict:
    post:
      operationId: chat_completion_v1_chat_completions_post
      summary: Chat Completion
      tags:
        - chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-speakeasy-name-override: complete
      x-speakeasy-usage-example:
        title: Create Chat Completions
        description: This example shows how to create chat completions.
        position: 1
  /rawPredict#fim:
    post:
      operationId: fim_completion_v1_fim_completions_post
      summary: Fim Completion
      description: FIM completion.
      tags:
        - fim
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FIMCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FIMCompletionResponse'
              examples:
                userExample:
                  value:
                    id: 447e3e0d457e42e98248b5d2ef52a2a3
                    object: chat.completion
                    model: codestral-2508
                    usage:
                      prompt_tokens: 8
                      completion_tokens: 91
                      total_tokens: 99
                    created: 1759496862
                    choices:
                      - index: 0
                        message:
                          content: |
                            add_numbers(a: int, b: int) -> int:
                                """
                                You are given two integers `a` and `b`. Your task is to write a function that
                                returns the sum of these two integers. The function should be implemented in a
                                way that it can handle very large integers (up to 10^18). As a reminder, your
                                code has to be in python
                                """
                          tool_calls: null
                          prefix: false
                          role: assistant
                        finish_reason: stop
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-speakeasy-name-override: complete
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
    BuiltInConnectors:
      type: string
      title: BuiltInConnectors
      enum:
        - web_search
        - web_search_premium
        - code_interpreter
        - image_generation
        - document_library
    Function:
      type: object
      properties:
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
        strict:
          type: boolean
          title: Strict
        parameters:
          type: object
          title: Parameters
          additionalProperties: true
      title: Function
      required:
        - name
        - parameters
      additionalProperties: false
    ImageDetail:
      type: string
      title: ImageDetail
      enum:
        - low
        - auto
        - high
    ImageURL:
      type: object
      properties:
        url:
          type: string
          title: Url
        detail:
          anyOf:
            - $ref: '#/components/schemas/ImageDetail'
            - type: 'null'
      title: ImageURL
      required:
        - url
      additionalProperties: false
    ImageURLChunk:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: image_url
          const: image_url
        image_url:
          anyOf:
            - $ref: '#/components/schemas/ImageURL'
            - type: string
          title: Image Url
      title: ImageURLChunk
      required:
        - image_url
      additionalProperties: false
      description: '{"type":"image_url","image_url":{"url":"data:image/png;base64,iVBORw0'
    JsonSchema:
      type: object
      properties:
        name:
          type: string
          title: Name
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        schema:
          type: object
          title: Schema
          additionalProperties: true
          x-speakeasy-name-override: schema_definition
        strict:
          type: boolean
          title: Strict
      title: JsonSchema
      required:
        - name
        - schema
      additionalProperties: false
    Prediction:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: content
          const: content
        content:
          type: string
          title: Content
          default: ''
      title: Prediction
      additionalProperties: false
      description: Enable users to specify an expected completion, optimizing response times by leveraging known or predictable content.
    ResponseFormat:
      type: object
      examples:
        - type: text
        - type: json_object
        - type: json_schema
          json_schema:
            schema:
              properties:
                name:
                  title: Name
                  type: string
                authors:
                  items:
                    type: string
                  title: Authors
                  type: array
              required:
                - name
                - authors
              title: Book
              type: object
              additionalProperties: false
            name: book
            strict: true
      properties:
        type:
          $ref: '#/components/schemas/ResponseFormats'
          default: text
        json_schema:
          anyOf:
            - $ref: '#/components/schemas/JsonSchema'
            - type: 'null'
      title: ResponseFormat
      additionalProperties: false
      description: 'Specify the format that the model must output. By default it will use `{ "type": "text" }`. Setting to `{ "type": "json_object" }` enables JSON mode, which guarantees the message the model generates is in JSON. When using JSON mode you MUST also instruct the model to produce JSON yourself with a system or a user message. Setting to `{ "type": "json_schema" }` enables JSON schema mode, which guarantees the message the model generates is in JSON and follows the schema you provide.'
    ResponseFormats:
      type: string
      title: ResponseFormats
      enum:
        - text
        - json_object
        - json_schema
    TextChunk:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: text
          const: text
        text:
          type: string
          title: Text
      title: TextChunk
      required:
        - text
      additionalProperties: false
    ThinkChunk:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: thinking
          const: thinking
        thinking:
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/TextChunk'
              - $ref: '#/components/schemas/ToolReferenceChunk'
              - $ref: '#/components/schemas/ReferenceChunk'
          title: Thinking
        closed:
          type: boolean
          title: Closed
          description: Whether the thinking chunk is closed or not. Currently only used for prefixing.
      title: ThinkChunk
      required:
        - thinking
      additionalProperties: false
    ToolChoiceEnum:
      type: string
      title: ToolChoiceEnum
      enum:
        - auto
        - none
        - any
        - required
    ToolReferenceChunk:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: tool_reference
          const: tool_reference
        tool:
          anyOf:
            - $ref: '#/components/schemas/BuiltInConnectors'
            - type: string
          title: Tool
        title:
          type: string
          title: Title
        url:
          anyOf:
            - type: string
            - type: 'null'
          title: Url
        favicon:
          anyOf:
            - type: string
            - type: 'null'
          title: Favicon
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
      title: ToolReferenceChunk
      required:
        - tool
        - title
      additionalProperties: false
    ReferenceChunk:
      type: object
      properties:
        type:
          type: string
          title: Type
          default: reference
          const: reference
        reference_ids:
          type: array
          items:
            type: integer
          title: Reference Ids
      title: ReferenceChunk
      required:
        - reference_ids
      additionalProperties: false
    AssistantMessage:
      type: object
      properties:
        role:
          type: string
          title: Role
          default: assistant
          const: assistant
        content:
          anyOf:
            - type: string
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ContentChunk'
          title: Content
        tool_calls:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/ToolCall'
            - type: 'null'
          title: Tool Calls
        prefix:
          type: boolean
          title: Prefix
          description: Set this to `true` when adding an assistant message as prefix to condition the model response. The role of the prefix message is to force the model to start its answer by the content of the message.
          default: false
      title: AssistantMessage
      additionalProperties: false
    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          examples:
            - mistral-large-latest
          title: Model
          description: ID of the model to use. You can use the [List Available Models](/api/#tag/models/operation/list_models_v1_models_get) API to see all of your available models, or see our [Model overview](/models) for model descriptions.
        temperature:
          anyOf:
            - type: number
              maximum: 1.5
              minimum: 0
            - type: 'null'
          title: Temperature
          description: What sampling temperature to use, we recommend between 0.0 and 0.7. Higher values like 0.7 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. We generally recommend altering this or `top_p` but not both. The default value varies depending on the model you are targeting. Call the `/models` endpoint to retrieve the appropriate value.
        top_p:
          type: number
          title: Top P
          maximum: 1
          minimum: 0
          description: Nucleus sampling, where the model considers the results of the tokens with `top_p` probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered. We generally recommend altering this or `temperature` but not both.
        max_tokens:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Max Tokens
          description: The maximum number of tokens to generate in the completion. The token count of your prompt plus `max_tokens` cannot exceed the model's context length.
        stream:
          type: boolean
          title: Stream
          description: 'Whether to stream back partial progress. If set, tokens will be sent as data-only server-side events as they become available, with the stream terminated by a data: [DONE] message. Otherwise, the server will hold the request open until the timeout or until completion, with the response containing the full result as JSON.'
          default: false
        stop:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          title: Stop
          description: Stop generation if this token is detected. Or if one of these tokens is detected when providing an array
        random_seed:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Random Seed
          description: The seed to use for random sampling. If set, different calls will generate deterministic results.
        metadata:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          title: Metadata
        messages:
          type: array
          examples:
            - - role: user
                content: Who is the best French painter? Answer in one short sentence.
          items:
            oneOf:
              - $ref: '#/components/schemas/SystemMessage'
              - $ref: '#/components/schemas/UserMessage'
              - $ref: '#/components/schemas/AssistantMessage'
              - $ref: '#/components/schemas/ToolMessage'
            discriminator:
              propertyName: role
              mapping:
                assistant: '#/components/schemas/AssistantMessage'
                system: '#/components/schemas/SystemMessage'
                tool: '#/components/schemas/ToolMessage'
                user: '#/components/schemas/UserMessage'
          title: Messages
          description: The prompt(s) to generate completions for, encoded as a list of dict with role and content.
        response_format:
          $ref: '#/components/schemas/ResponseFormat'
        tools:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Tool'
            - type: 'null'
          title: Tools
          description: A list of tools the model may call. Use this to provide a list of functions the model may generate JSON inputs for.
        tool_choice:
          anyOf:
            - $ref: '#/components/schemas/ToolChoice'
            - $ref: '#/components/schemas/ToolChoiceEnum'
          title: Tool Choice
          description: 'Controls which (if any) tool is called by the model. `none` means the model will not call any tool and instead generates a message. `auto` means the model can pick between generating a message or calling one or more tools. `any` or `required` means the model must call one or more tools. Specifying a particular tool via `{"type": "function", "function": {"name": "my_function"}}` forces the model to call that tool.'
          default: auto
        presence_penalty:
          type: number
          title: Presence Penalty
          maximum: 2
          minimum: -2
          description: The `presence_penalty` determines how much the model penalizes the repetition of words or phrases. A higher presence penalty encourages the model to use a wider variety of words and phrases, making the output more diverse and creative.
        frequency_penalty:
          type: number
          title: Frequency Penalty
          maximum: 2
          minimum: -2
          description: The `frequency_penalty` penalizes the repetition of words based on their frequency in the generated text. A higher frequency penalty discourages the model from repeating words that have already appeared frequently in the output, promoting diversity and reducing repetition.
        n:
          anyOf:
            - type: integer
              minimum: 1
            - type: 'null'
          title: N
          description: Number of completions to return for each request, input tokens are only billed once.
        prediction:
          $ref: '#/components/schemas/Prediction'
          description: Enable users to specify expected results, optimizing response times by leveraging known or predictable content. This approach is especially effective for updating text documents or code files with minimal changes, reducing latency while maintaining high-quality results.
          default:
            type: content
            content: ''
        parallel_tool_calls:
          type: boolean
          title: Parallel Tool Calls
          description: Whether to enable parallel function calling during tool use, when enabled the model can call multiple tools in parallel.
        prompt_mode:
          anyOf:
            - $ref: '#/components/schemas/MistralPromptMode'
            - type: 'null'
          description: Allows toggling between the reasoning mode and no system prompt. When set to `reasoning` the system prompt for reasoning models will be used.
      title: ChatCompletionRequest
      required:
        - messages
        - model
      additionalProperties: false
    FIMCompletionRequest:
      type: object
      properties:
        model:
          type: string
          examples:
            - codestral-latest
          title: Model
          description: ID of the model with FIM to use.
        temperature:
          anyOf:
            - type: number
              maximum: 1.5
              minimum: 0
            - type: 'null'
          title: Temperature
          description: What sampling temperature to use, we recommend between 0.0 and 0.7. Higher values like 0.7 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. We generally recommend altering this or `top_p` but not both. The default value varies depending on the model you are targeting. Call the `/models` endpoint to retrieve the appropriate value.
        top_p:
          type: number
          title: Top P
          maximum: 1
          minimum: 0
          description: Nucleus sampling, where the model considers the results of the tokens with `top_p` probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered. We generally recommend altering this or `temperature` but not both.
          default: 1.0
        max_tokens:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Max Tokens
          description: The maximum number of tokens to generate in the completion. The token count of your prompt plus `max_tokens` cannot exceed the model's context length.
        stream:
          type: boolean
          title: Stream
          description: 'Whether to stream back partial progress. If set, tokens will be sent as data-only server-side events as they become available, with the stream terminated by a data: [DONE] message. Otherwise, the server will hold the request open until the timeout or until completion, with the response containing the full result as JSON.'
          default: false
        stop:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          title: Stop
          description: Stop generation if this token is detected. Or if one of these tokens is detected when providing an array
        random_seed:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Random Seed
          description: The seed to use for random sampling. If set, different calls will generate deterministic results.
        metadata:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          title: Metadata
        prompt:
          type: string
          examples:
            - def
          title: Prompt
          description: The text/code to complete.
        suffix:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - return a+b
          title: Suffix
          description: Optional text/code that adds more context for the model. When given a `prompt` and a `suffix` the model will fill what is between them. When `suffix` is not provided, the model will simply execute completion starting with `prompt`.
          default: ''
        min_tokens:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          title: Min Tokens
          description: The minimum number of tokens to generate in the completion.
      title: FIMCompletionRequest
      required:
        - prompt
        - model
      additionalProperties: false
    FunctionCall:
      type: object
      properties:
        name:
          type: string
          title: Name
        arguments:
          title: Arguments
          anyOf:
            - type: object
              additionalProperties: true
            - type: string
      title: FunctionCall
      required:
        - name
        - arguments
      additionalProperties: false
    FunctionName:
      type: object
      properties:
        name:
          type: string
          title: Name
      title: FunctionName
      required:
        - name
      additionalProperties: false
      description: this restriction of `Function` is used to select a specific function to call
    MistralPromptMode:
      type: string
      title: MistralPromptMode
      enum:
        - reasoning
      description: |-
        Available options to the prompt_mode argument on the chat completion endpoint.
        Values represent high-level intent. Assignment to actual SPs is handled internally.
        System prompt may include knowledge cutoff date, model capabilities, tone to use, safety guidelines, etc.
      x-speakeasy-unknown-values: allow
    SystemMessage:
      type: object
      properties:
        role:
          type: string
          title: Role
          default: system
          const: system
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/SystemMessageContentChunks'
          title: Content
      title: SystemMessage
      required:
        - content
      additionalProperties: false
    Tool:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ToolTypes'
          default: function
        function:
          $ref: '#/components/schemas/Function'
      title: Tool
      required:
        - function
      additionalProperties: false
    ToolCall:
      type: object
      properties:
        id:
          type: string
          title: Id
          default: 'null'
        type:
          $ref: '#/components/schemas/ToolTypes'
          default: function
        function:
          $ref: '#/components/schemas/FunctionCall'
        index:
          type: integer
          title: Index
          default: 0
      title: ToolCall
      required:
        - function
      additionalProperties: false
    ToolChoice:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ToolTypes'
          default: function
        function:
          $ref: '#/components/schemas/FunctionName'
      title: ToolChoice
      required:
        - function
      additionalProperties: false
      description: ToolChoice is either a ToolChoiceEnum or a ToolChoice
    ToolMessage:
      type: object
      properties:
        role:
          type: string
          title: Role
          default: tool
          const: tool
        content:
          anyOf:
            - type: string
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ContentChunk'
          title: Content
        tool_call_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Tool Call Id
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
      title: ToolMessage
      required:
        - content
      additionalProperties: false
    UsageInfo:
      type: object
      properties:
        prompt_tokens:
          type: integer
          title: Prompt Tokens
          default: 0
        completion_tokens:
          title: Completion Tokens
          default: 0
          type: integer
        total_tokens:
          type: integer
          title: Total Tokens
          default: 0
        prompt_audio_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Prompt Audio Seconds
      title: UsageInfo
      x-speakeasy-include: true
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens
      additionalProperties: true
    UserMessage:
      type: object
      properties:
        role:
          type: string
          title: Role
          default: user
          const: user
        content:
          anyOf:
            - type: string
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ContentChunk'
          title: Content
      title: UserMessage
      required:
        - content
      additionalProperties: false
    SystemMessageContentChunks:
      oneOf:
        - $ref: '#/components/schemas/TextChunk'
        - $ref: '#/components/schemas/ThinkChunk'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/TextChunk'
          thinking: '#/components/schemas/ThinkChunk'
      title: SystemMessageContentChunks
    CompletionEvent:
      title: CompletionEvent
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/CompletionChunk'
    CompletionChunk:
      title: CompletionChunk
      type: object
      required:
        - id
        - model
        - choices
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        usage:
          $ref: '#/components/schemas/UsageInfo'
        choices:
          type: array
          items:
            $ref: '#/components/schemas/CompletionResponseStreamChoice'
    CompletionResponseStreamChoice:
      title: CompletionResponseStreamChoice
      type: object
      required:
        - index
        - delta
        - finish_reason
      properties:
        index:
          type: integer
        delta:
          $ref: '#/components/schemas/DeltaMessage'
        finish_reason:
          type:
            - string
            - 'null'
          enum:
            - stop
            - length
            - error
            - tool_calls
            - null
          x-speakeasy-unknown-values: allow
    ResponseBase:
      type: object
      title: ResponseBase
      properties:
        id:
          type: string
          example: cmpl-e5cc70bb28c444948073e77776eb30ef
        object:
          type: string
          example: chat.completion
        model:
          type: string
          example: mistral-small-latest
        usage:
          $ref: '#/components/schemas/UsageInfo'
    ChatCompletionChoice:
      title: ChatCompletionChoice
      type: object
      required:
        - index
        - finish_reason
        - message
      properties:
        index:
          type: integer
          example: 0
        message:
          $ref: '#/components/schemas/AssistantMessage'
        finish_reason:
          type: string
          enum:
            - stop
            - length
            - model_length
            - error
            - tool_calls
          example: stop
          x-speakeasy-unknown-values: allow
    DeltaMessage:
      title: DeltaMessage
      type: object
      properties:
        role:
          anyOf:
            - type: string
            - type: 'null'
        content:
          anyOf:
            - type: string
            - type: 'null'
            - items:
                $ref: '#/components/schemas/ContentChunk'
              type: array
        tool_calls:
          anyOf:
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ToolCall'
    ChatCompletionResponseBase:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - type: object
          title: ChatCompletionResponseBase
          properties:
            created:
              type: integer
              example: 1702256327
    ChatCompletionResponse:
      allOf:
        - $ref: '#/components/schemas/ChatCompletionResponseBase'
        - type: object
          title: ChatCompletionResponse
          properties:
            choices:
              type: array
              items:
                $ref: '#/components/schemas/ChatCompletionChoice'
          required:
            - id
            - object
            - data
            - model
            - usage
            - created
            - choices
    FIMCompletionResponse:
      allOf:
        - $ref: '#/components/schemas/ChatCompletionResponse'
        - type: object
          properties:
            model:
              type: string
              example: codestral-latest
    ToolTypes:
      type: string
      enum:
        - function
      title: ToolTypes
      x-speakeasy-unknown-values: allow
    ChatCompletionStreamRequest:
      allOf:
        - $ref: '#/components/schemas/ChatCompletionRequest'
        - type: object
          properties:
            stream:
              type: boolean
              default: true
    FIMCompletionStreamRequest:
      allOf:
        - $ref: '#/components/schemas/FIMCompletionRequest'
        - type: object
          properties:
            stream:
              type: boolean
              default: true
    ContentChunk:
      oneOf:
        - $ref: '#/components/schemas/TextChunk'
        - $ref: '#/components/schemas/ImageURLChunk'
        - $ref: '#/components/schemas/ReferenceChunk'
      discriminator:
        propertyName: type
        mapping:
          image_url: '#/components/schemas/ImageURLChunk'
          text: '#/components/schemas/TextChunk'
          reference: '#/components/schemas/ReferenceChunk'
      title: ContentChunk
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
security:
  - ApiKey: []
servers:
  - url: https://api.mistral.ai
    x-speakeasy-server-id: eu
    description: EU Production server
tags:
  - name: chat
    x-displayName: Chat
    description: Chat Completion API.
  - name: fim
    x-displayName: FIM
    description: Fill-in-the-middle API.
