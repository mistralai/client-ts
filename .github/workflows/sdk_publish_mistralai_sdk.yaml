name: Publish MISTRALAI-SDK
permissions:
  contents: read
  id-token: write
"on":
  push:
    branches:
      - main
    paths:
      - RELEASES.md
      - '*/RELEASES.md'
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type 'publish' to confirm v2 release"
        required: true
      npm_tag:
        description: "npm dist-tag to publish"
        type: choice
        default: latest
        required: false
        options:
          - latest
          - alpha
jobs:
  publish:
    if: github.event_name == 'push' || github.event.inputs.confirm_publish == 'publish'
    runs-on: ubuntu-24.04
    environment:
      name: publish
    env:
      NPM_TAG: ${{ github.event.inputs.npm_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npx -y -p npm@11.14.0 npm install --ignore-scripts --min-release-age=7

      - name: Build package
        run: npm run build

      - name: Publish package to npm
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "Detected version: $VERSION"

          if [ -n "$NPM_TAG" ]; then
            TAG="$NPM_TAG"
          elif [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE=${VERSION#*-}
            TAG=${PRERELEASE%%.*}
          else
            TAG="latest"
          fi

          echo "Publishing under dist-tag: $TAG"
          npm publish --tag "$TAG" --access public --provenance
