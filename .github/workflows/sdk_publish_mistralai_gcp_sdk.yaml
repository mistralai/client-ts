name: Publish MISTRALAI-GCP-SDK
permissions:
  contents: read
  id-token: write
"on":
  push:
    branches:
      - v1
    paths:
      - packages/mistralai-gcp/RELEASES.md
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type 'publish' to confirm v2 release"
        required: true
jobs:
  publish:
    if: github.event_name == 'push' || github.event.inputs.confirm_publish == 'publish'
    runs-on: ubuntu-24.04
    environment:
      name: publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/mistralai-gcp
        run: npx -y -p npm@11.14.0 npm install --ignore-scripts --min-release-age=7

      - name: Build package
        working-directory: packages/mistralai-gcp
        run: npm run build

      - name: Publish package to npm
        working-directory: packages/mistralai-gcp
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "Detected version: $VERSION"

          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE=${VERSION#*-}
            TAG=${PRERELEASE%%.*}
          else
            TAG="latest"
          fi

          echo "Publishing under dist-tag: $TAG"
          npm publish --tag "$TAG" --access public --provenance
