name: Publish MISTRALAI-AZURE-SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
"on":
  push:
    branches:
      - v1
    paths:
      - packages/mistralai-azure/RELEASES.md
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type 'publish' to confirm v2 release"
        required: true
jobs:
  publish:
    if: github.event_name == 'push' || github.event.inputs.confirm_publish == 'publish'
    uses: ./.github/workflows/_speakeasy_sdk_publish.yaml
