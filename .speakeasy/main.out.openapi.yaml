      type: object
      properties:
        src:
          type: string
          title: Src
        mimeType:
          anyOf:
            - type: string
            - type: "null"
          title: Mimetype
        sizes:
          anyOf:
            - type: array
              items:
                type: string
            - type: "null"
          title: Sizes
