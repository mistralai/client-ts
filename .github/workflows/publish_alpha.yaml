name: Publish Alpha to npm
permissions:
  contents: read
"on":
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type 'publish' to confirm alpha release"
        required: true
jobs:
  publish:
    if: github.event.inputs.confirm_publish == 'publish'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
